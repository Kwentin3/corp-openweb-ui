services:
  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3.6}
    container_name: openwebui-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - web

  openwebui:
    build:
      context: ..
      dockerfile: deploy/openwebui-native-web-stt-patch/Dockerfile
      args:
        OPENWEBUI_BASE_IMAGE: ${OPENWEBUI_BASE_IMAGE:-ghcr.io/open-webui/open-webui:v0.9.6}
        BROKER_REPORTS_SOURCE_REVISION: ${BROKER_REPORTS_SOURCE_REVISION:-untracked}
    image: ${OPENWEBUI_IMAGE:-corp-openwebui/openwebui:v0.9.6-native-web-stt-broker-intake-v2}
    container_name: openwebui
    restart: unless-stopped
    environment:
      WEBUI_URL: https://${OPENWEBUI_HOST}
      WEBUI_NAME: ${WEBUI_NAME:-Alpha Soft AI Chat}
      WEBUI_BANNERS: ${WEBUI_BANNERS:-[]}
      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEFAULT_MODELS: ${DEFAULT_MODELS:-}
      http_proxy: ${OPENWEBUI_OUTBOUND_PROXY:-}
      https_proxy: ${OPENWEBUI_OUTBOUND_PROXY:-}
      HTTP_PROXY: ${OPENWEBUI_OUTBOUND_PROXY:-}
      HTTPS_PROXY: ${OPENWEBUI_OUTBOUND_PROXY:-}
      no_proxy: ${OPENWEBUI_NO_PROXY:-localhost,127.0.0.1,::1,openwebui,traefik,openwebui-traefik,stage2-stt,stage2-stt:8080}
      NO_PROXY: ${OPENWEBUI_NO_PROXY:-localhost,127.0.0.1,::1,openwebui,traefik,openwebui-traefik,stage2-stt,stage2-stt:8080}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      WEBUI_AUTH: ${WEBUI_AUTH:-true}
      ENABLE_SIGNUP: ${ENABLE_SIGNUP:-false}
      DEFAULT_USER_ROLE: ${DEFAULT_USER_ROLE:-pending}
      WEBUI_ADMIN_EMAIL: ${WEBUI_ADMIN_EMAIL:-}
      WEBUI_ADMIN_PASSWORD: ${WEBUI_ADMIN_PASSWORD:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      BRAVE_SEARCH_CONTEXT_TOKENS: ${BRAVE_SEARCH_CONTEXT_TOKENS:-8192}
      YANDEX_WEB_SEARCH_API_KEY: ${YANDEX_WEB_SEARCH_API_KEY:-}
      YANDEX_WEB_SEARCH_URL: ${YANDEX_WEB_SEARCH_URL:-https://searchapi.api.cloud.yandex.net/v2/web/search}
      YANDEX_WEB_SEARCH_CONFIG: ${YANDEX_WEB_SEARCH_CONFIG:-}
    volumes:
      - openwebui_data:/app/backend/data
      - ../deploy/openwebui-static/loader.js:/app/backend/open_webui/static/loader.js:ro
      - ../deploy/openwebui-static/stage2-stt-normalization.json:/app/backend/open_webui/static/stage2-stt-normalization.json:ro
      - ../deploy/openwebui-static/stage2-assets:/app/backend/open_webui/static/stage2-assets:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.openwebui.rule=Host(`${OPENWEBUI_HOST}`)
      - traefik.http.routers.openwebui.entrypoints=websecure
      - traefik.http.routers.openwebui.tls=true
      - traefik.http.routers.openwebui.tls.certresolver=letsencrypt
      - traefik.http.services.openwebui.loadbalancer.server.port=8080
    networks:
      - web

  stage2-stt:
    build:
      context: ..
      dockerfile: services/stage2-stt/Dockerfile
    container_name: stage2-stt
    restart: unless-stopped
    environment:
      STAGE2_STT_PROVIDER: ${STAGE2_STT_PROVIDER:-lemonfox}
      STAGE2_STT_PROVIDER_ADAPTER: ${STAGE2_STT_PROVIDER_ADAPTER:-lemonfox}
      STAGE2_LEMONFOX_API_KEY: ${STAGE2_LEMONFOX_API_KEY:-}
      STAGE2_LEMONFOX_BASE_URL: ${STAGE2_LEMONFOX_BASE_URL:-https://api.lemonfox.ai}
      STAGE2_LEMONFOX_MODEL: ${STAGE2_LEMONFOX_MODEL:-}
      STAGE2_LEMONFOX_LANGUAGE: ${STAGE2_LEMONFOX_LANGUAGE:-ru}
      STAGE2_LEMONFOX_ENABLE_SPEAKER_LABELS: ${STAGE2_LEMONFOX_ENABLE_SPEAKER_LABELS:-false}
      STAGE2_LEMONFOX_ENABLE_TIMESTAMPS: ${STAGE2_LEMONFOX_ENABLE_TIMESTAMPS:-true}
      STAGE2_LEMONFOX_MAX_DIRECT_UPLOAD_MB: ${STAGE2_LEMONFOX_MAX_DIRECT_UPLOAD_MB:-100}
      STAGE2_LEMONFOX_MAX_URL_UPLOAD_MB: ${STAGE2_LEMONFOX_MAX_URL_UPLOAD_MB:-1024}
      STAGE2_LEMONFOX_PROVIDER_MAX_DURATION_MINUTES: ${STAGE2_LEMONFOX_PROVIDER_MAX_DURATION_MINUTES:-}
      STAGE2_STT_INPUT_ACCEPT_MODE: ${STAGE2_STT_INPUT_ACCEPT_MODE:-broad_ffmpeg_probe}
      STAGE2_STT_DECLARED_INPUT_EXTENSIONS: ${STAGE2_STT_DECLARED_INPUT_EXTENSIONS:-mp3,wav,m4a,webm,ogg,mp4,mov,mkv,avi,flac,aac}
      STAGE2_STT_DECLARED_INPUT_MIME_PREFIXES: ${STAGE2_STT_DECLARED_INPUT_MIME_PREFIXES:-audio/,video/}
      STAGE2_STT_REQUIRE_AUDIO_STREAM: ${STAGE2_STT_REQUIRE_AUDIO_STREAM:-true}
      STAGE2_STT_FFMPEG_PROBE_BEFORE_ACTION: ${STAGE2_STT_FFMPEG_PROBE_BEFORE_ACTION:-true}
      STAGE2_STT_OUTPUT_PROFILE: ${STAGE2_STT_OUTPUT_PROFILE:-mp3_high_compat}
      STAGE2_STT_FALLBACK_OUTPUT_PROFILE: ${STAGE2_STT_FALLBACK_OUTPUT_PROFILE:-mp3_high_compat}
      STAGE2_FFMPEG_BROWSER_MAX_INPUT_MB: ${STAGE2_FFMPEG_BROWSER_MAX_INPUT_MB:-1024}
      STAGE2_FFMPEG_BROWSER_MAX_DURATION_MINUTES: ${STAGE2_FFMPEG_BROWSER_MAX_DURATION_MINUTES:-}
      STAGE2_STT_STORAGE_MODE: ${STAGE2_STT_STORAGE_MODE:-auto}
      STAGE2_STT_REQUIRE_STORAGE_HEALTH: ${STAGE2_STT_REQUIRE_STORAGE_HEALTH:-false}
      STAGE2_STT_AUDIO_BUCKET: ${STAGE2_STT_AUDIO_BUCKET:-}
      STAGE2_STT_AUDIO_PREFIX: ${STAGE2_STT_AUDIO_PREFIX:-stage2/stt/prepared-audio/}
      STAGE2_STT_STORE_PREPARED_AUDIO: ${STAGE2_STT_STORE_PREPARED_AUDIO:-true}
      STAGE2_STT_STORE_SOURCE_MEDIA: ${STAGE2_STT_STORE_SOURCE_MEDIA:-false}
      STAGE2_STT_PREPARED_AUDIO_RETENTION_DAYS: ${STAGE2_STT_PREPARED_AUDIO_RETENTION_DAYS:-}
      STAGE2_STT_TRANSCRIPT_RETENTION_DAYS: ${STAGE2_STT_TRANSCRIPT_RETENTION_DAYS:-}
      STAGE2_STT_ARTIFACT_STORE_MODE: ${STAGE2_STT_ARTIFACT_STORE_MODE:-disabled}
      STAGE2_STT_ARTIFACT_STORE_PATH: ${STAGE2_STT_ARTIFACT_STORE_PATH:-/data/stage2-stt/artifacts.sqlite3}
      STAGE2_STT_ARTIFACT_PAYLOAD_DIR: ${STAGE2_STT_ARTIFACT_PAYLOAD_DIR:-/data/stage2-stt/artifact-payloads}
      STAGE2_STT_TRANSCRIPT_TTL_DAYS: ${STAGE2_STT_TRANSCRIPT_TTL_DAYS:-14}
      STAGE2_STT_TRANSFORMATION_TTL_DAYS: ${STAGE2_STT_TRANSFORMATION_TTL_DAYS:-14}
      STAGE2_STT_PREPARED_AUDIO_TTL_HOURS: ${STAGE2_STT_PREPARED_AUDIO_TTL_HOURS:-24}
      STAGE2_STT_DIAGNOSTIC_PROVIDER_PAYLOAD_ENABLED: ${STAGE2_STT_DIAGNOSTIC_PROVIDER_PAYLOAD_ENABLED:-false}
      STAGE2_STT_DIAGNOSTIC_PROVIDER_PAYLOAD_TTL_HOURS: ${STAGE2_STT_DIAGNOSTIC_PROVIDER_PAYLOAD_TTL_HOURS:-0}
      STAGE2_STT_ARTIFACT_ROTATION_INTERVAL_HOURS: ${STAGE2_STT_ARTIFACT_ROTATION_INTERVAL_HOURS:-24}
      STAGE2_STT_ARTIFACT_HARD_DELETE_AFTER_EXPIRY: ${STAGE2_STT_ARTIFACT_HARD_DELETE_AFTER_EXPIRY:-true}
      STAGE2_STT_PROMPT_CATALOG_MODE: ${STAGE2_STT_PROMPT_CATALOG_MODE:-disabled}
      STAGE2_STT_OPENWEBUI_PROMPT_DB_PATH: ${STAGE2_STT_OPENWEBUI_PROMPT_DB_PATH:-/openwebui-data/webui.db}
      STAGE2_STT_POSTPROCESSING_EXECUTOR_MODE: ${STAGE2_STT_POSTPROCESSING_EXECUTOR_MODE:-disabled}
      STAGE2_STT_POSTPROCESSING_OPENAI_BASE_URL: ${OPENAI_API_BASE_URL:-}
      STAGE2_STT_POSTPROCESSING_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STAGE2_STT_POSTPROCESSING_OPENAI_MODEL: ${STAGE2_STT_POSTPROCESSING_OPENAI_MODEL:-gpt-5.4-mini}
      STAGE2_STT_POSTPROCESSING_MAX_TRANSCRIPT_CHARS: ${STAGE2_STT_POSTPROCESSING_MAX_TRANSCRIPT_CHARS:-60000}
      STAGE2_STT_MESSAGE_DOCX_MAX_MESSAGE_CHARS: ${STAGE2_STT_MESSAGE_DOCX_MAX_MESSAGE_CHARS:-100000}
      STAGE2_STT_MESSAGE_DOCX_MAX_DOCX_MB: ${STAGE2_STT_MESSAGE_DOCX_MAX_DOCX_MB:-5}
      http_proxy: ${OPENWEBUI_OUTBOUND_PROXY:-}
      https_proxy: ${OPENWEBUI_OUTBOUND_PROXY:-}
      HTTP_PROXY: ${OPENWEBUI_OUTBOUND_PROXY:-}
      HTTPS_PROXY: ${OPENWEBUI_OUTBOUND_PROXY:-}
      no_proxy: ${OPENWEBUI_NO_PROXY:-localhost,127.0.0.1,::1,openwebui,traefik,openwebui-traefik,stage2-stt,stage2-stt:8080}
      NO_PROXY: ${OPENWEBUI_NO_PROXY:-localhost,127.0.0.1,::1,openwebui,traefik,openwebui-traefik,stage2-stt,stage2-stt:8080}
      STAGE2_STT_MAX_PREPARED_AUDIO_MB: ${STAGE2_STT_MAX_PREPARED_AUDIO_MB:-100}
      STAGE2_STT_DIRECT_UPLOAD_WARNING_MB: ${STAGE2_STT_DIRECT_UPLOAD_WARNING_MB:-100}
      STAGE2_STT_ON_PREPARED_AUDIO_TOO_LARGE: ${STAGE2_STT_ON_PREPARED_AUDIO_TOO_LARGE:-fail}
      STAGE2_STT_INTERNAL_MAX_DURATION_MINUTES: ${STAGE2_STT_INTERNAL_MAX_DURATION_MINUTES:-}
      STAGE2_STT_CANCEL_PROVIDER_IF_SUPPORTED: ${STAGE2_STT_CANCEL_PROVIDER_IF_SUPPORTED:-true}
      STAGE2_STT_CANCEL_LOCAL_ON_PROVIDER_NO_CANCEL: ${STAGE2_STT_CANCEL_LOCAL_ON_PROVIDER_NO_CANCEL:-true}
      STAGE2_STT_PROVIDER_CANCEL_SUPPORT: ${STAGE2_STT_PROVIDER_CANCEL_SUPPORT:-unknown}
      STAGE2_STT_INTERNAL_API_KEY: ${STAGE2_STT_INTERNAL_API_KEY:-}
      STAGE2_STT_ALLOW_STUB_TRANSCRIPT: ${STAGE2_STT_ALLOW_STUB_TRANSCRIPT:-false}
    volumes:
      - stage2_stt_data:/data/stage2-stt
      - openwebui_data:/openwebui-data:ro
    expose:
      - "8080"
    networks:
      - web

networks:
  web:
    name: openwebui_web

volumes:
  openwebui_data:
    name: openwebui_data
  traefik_letsencrypt:
    name: traefik_letsencrypt
  stage2_stt_data:
    name: stage2_stt_data
