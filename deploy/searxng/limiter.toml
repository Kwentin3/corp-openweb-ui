# Stage 2 private SearXNG limiter config.
# Keep this conservative. If pilot queries hit false-positive bot blocks, tune
# limits with runtime evidence rather than disabling limiter globally.

[botdetection.ip_limit]
link_token = false

[botdetection.ip_lists]
block_ip = []
pass_ip = [
  "127.0.0.0/8",
  "::1",
  "172.16.0.0/12",
]
